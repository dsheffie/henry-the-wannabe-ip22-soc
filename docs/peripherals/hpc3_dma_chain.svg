<text xml:space="preserve" text-anchor="start" x="939.75" y="-42.55" font-family="Helvetica,sans-Serif" font-size="11.00">Per byte, on each WD33C93 DRQ: &#160;DRAM[cbp] &lt;&#45;&gt; WD33C93 ; &#160;cbp++ ; &#160;count&#45;&#45;</text>
<text xml:space="preserve" text-anchor="start" x="939.75" y="-29.05" font-family="Helvetica,sans-Serif" font-size="11.00">At count==0: &#160;if BC.XIE raise channel IRQ ; &#160;if BC.EOX deactivate ; &#160;else fetch next via DP</text>
<text xml:space="preserve" text-anchor="start" x="939.75" y="-15.55" font-family="Helvetica,sans-Serif" font-size="11.00">The zero&#45;length EOX terminator is the SCSI&#45;rx last&#45;byte&#45;stuck workaround (spec 5.1).</text>
