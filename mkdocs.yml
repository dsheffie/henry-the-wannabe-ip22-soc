site_name: Henry — the wannabe IP22 SoC
site_description: A from-scratch SoC that impersonates the SGI Indy (IP22) well enough to boot IRIX, built around the r9999 MIPS core.
docs_dir: docs

theme:
  name: material
  icon:
    logo: material/chip
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - toc.follow
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - tables
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - Architecture: architecture.md
  - CPU integration (r9999): cpu-integration.md
  - Firmware (ARCS shim): firmware-arcs.md
  - Boot & console: boot-and-console.md
  - Cache, coherence & TLB: coherence-cache-tlb.md
  - Peripherals:
      - MC (memory controller): peripherals/mc.md
      - IOC2 (serial console): peripherals/ioc2.md
      - HPC3 (SCSI/enet/DMA, RTC): peripherals/hpc3.md
      - GIO64 (bus): peripherals/gio64.md
      - VDMA (virtual DMA): peripherals/vdma.md
      - DMUX (data mux): peripherals/dmux1.md
  - Graphics (Newport):
      - Overview: graphics/index.md
      - REX3 (raster engine): graphics/rex3.md
      - VC2 (video timing/cursor): graphics/vc2.md
      - XMAP9 (colormap): graphics/xmap9.md
      - RB2 & RO1 (framebuffer/output): graphics/rb2-ro1.md
  - Methodology (MAME oracle): methodology.md
